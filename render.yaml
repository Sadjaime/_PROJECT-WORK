services:
  - type: web
    name: fintech-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: FastAPI Fintech Web App
      - key: DESCRIPTION
        value: A portfolio fintech app for virtual trading, portfolios, and social market feeds.
      - key: DATABASE_URL
        fromDatabase:
          name: fintech-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: fintech-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false

databases:
  - name: fintech-db
    plan: free
    databaseName: fintech_app
    postgresMajorVersion: "17"
